<footer class="footer">
  <div class="container footer__inner">
    <div class="brand">
      <img class="brand__mark" src="{{ absURL "images/nightblue-logo-v2-logo-transparent.png" }}" alt="" aria-hidden="true">
      <span class="brand__name"><span class="brand__name-night">Night</span><span class="brand__name-blue">Blue</span></span>
    </div>
    <p class="footer__copy">&copy; <span data-year>{{ now.Year }}</span> {{ site.Title }}. All rights reserved.</p>
    <nav class="footer__links" aria-label="Footer">
      <a href="{{ absURL "" }}">Blog</a>
      {{- range site.Data.menu }}
      <a href="{{ if hasPrefix .url "http" }}{{ .url }}{{ else }}{{ absURL .url }}{{ end }}">{{ .item }}</a>
      {{- end }}
    </nav>
  </div>
</footer>
<script src="{{ absURL "main.js" }}"></script>
